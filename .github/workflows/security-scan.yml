name: Security Scan

on:
  schedule:
    # Run weekly security scans every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  security-scan:
    name: Weekly security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          if command -v shellcheck >/dev/null 2>&1; then
            echo "ShellCheck already installed"
          else
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      - name: Run comprehensive security tests
        run: bash scripts/test-security.sh

      - name: Run security tests with coverage
        run: |
          pytest tests/test_security_session_start.py \
            --cov=plugins/sdd-workflow/scripts/session-start \
            --cov-report=term \
            --cov-report=html:coverage-security-scan \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-coverage
          path: coverage-security-scan

      - name: Check for Python package vulnerabilities (if requirements.txt exists)
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install safety
          safety check --file requirements.txt || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Weekly security scan failed. Please review the logs."
