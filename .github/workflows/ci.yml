name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  validate:
    name: Validate marketplace & plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validate-marketplace.sh
        run: bash scripts/validate-marketplace.sh

  shellcheck:
    name: ShellCheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Run ShellCheck on all .sh files
        run: |
          find . -name "*.sh" -type f -print0 | xargs -0 shellcheck -S warning -e SC1091

  plugin-lint:
    name: Plugin lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run plugin-lint.sh
        run: bash scripts/plugin-lint.sh

  test:
    name: Test session-start.py (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run session-start regression tests
        run: bash scripts/test-session-start.sh

  security:
    name: Security regression tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pytest and coverage tools
        run: pip install pytest pytest-cov
      - name: Run security tests with coverage
        run: |
          pytest tests/test_security_session_start.py \
            --cov=plugins/sdd-workflow/scripts/session-start \
            --cov-report=term \
            --cov-report=html:coverage-${{ matrix.os }} \
            -v
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage-${{ matrix.os }}
      - name: Upload security test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results-${{ matrix.os }}
          path: |
            tests/test_security_session_start.py
            scripts/test-security.sh
